# Rime schema
# vim: set sw=2 sts=2 et:
# encoding: utf-8

schema:
  schema_id: blg_tsuan
  name: й–©еҚ—иӘһжіүе·һйҹі
  version: "2026.4.29"
  author:
    - йҳҝжүҳ <a-thok@outlook.com>
    - Enatsu <unsioer@outlook.com>
  description: |
    й–©еҚ—иӘһијёе…Ҙж–№жЎҲ
    жҺЎз”ЁгҖҢиҮәзҒЈй–©еҚ—иӘһзҫ…йҰ¬еӯ—жӢјйҹіж–№жЎҲгҖҚ
    http://www.ntcu.edu.tw/tailo/

switches:
  - name: ascii_mode
    reset: 0
    states: [ дёӯж–Ү, иҘҝж–Ү ]
  - name: full_shape
    states: [ еҚҠи§’, е…Ёи§’ ]
  - options: [ tw, hant, hans ]
    states: [ иҮәз№Ғ, йҖҡз№Ғ, з®ҖдҪ“ ] # йҖҡз№ҒеҖҡйқ  OpenCC з№Ғй«”
  - name: variants
    reset: 1
    states: [ еҺҹе§Ӣ, е…је®№ ] # з№Ғз°ЎиҪүжҸӣпјҢе–®еӯ—е…је®№гҖҢзқҖ/и‘—гҖҚ

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - echo_translator
    - punct_translator
    - r10n_translator
    - reverse_lookup_translator
  filters:
    - simplifier@hant
    - simplifier@hans
    - simplifier@variants
    - uniquifier
    - lua_filter@*biauim.schema_dict_isolation

speller:
  alphabet: 'zyxwvutsrqponmlkjihgfedcba~[/\]90-;'
  initials: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    - xform/\{[^\}]*\}//
    - xform/(\d)0/$1/ # иј•иҒІжЁҷиЁҳ
    - abbrev/^([ptkbgmlschj]h?).+$/$1/ 
    - derive/^c/ts/
    - derive/S//  # гҖҢйӣҷгҖҚгҖҢж‘”гҖҚгҖҢйҮқгҖҚгҖҢжұҒгҖҚ
    - derive/JINN/ni/ # гҖҢиҖігҖҚгҖҢзҲҫгҖҚж–Үи®Җ
    - derive/NG/ng/ # гҖҢжҜӣгҖҚгҖҢе…©гҖҚзҷҪи®Җ
    - derive/uih/ueh/
    - derive/^j/l/
    - derive/Ia/io/
    - derive/Uee/ue/  # гҖҢз•«гҖҚгҖҢеҠғгҖҚ
    - derive/ee/e/
    - derive/enn/inn/
    - derive/^([mn]g?)ee/$1i/
    - derive/ira/a/
    - derive/ira/ia/
    - derive/IR/ir/
    - derive/ir(h?\d?)$/i$1/  # жө·еҸЈи…”
    - derive/ur/ir/
    - derive/Er/er/
    - derive/ere/ue/
    - derive/uIn?n?/ng/
    - derive/uainn/uinn/
    - derive/uAinn/uinn/
    - derive/iO/io/
    - derive/(t?sh?)iO/$1o/
    - derive/U([^e|$])/u$1/
    - derive/aI/ui/
    - derive/aI/ai/
    - derive/^mue/mui/
    - derive/er([nt])(\d?\s?)/u$1$2/
    - derive/er([nt])/ir$1/
    - derive/oO/oo/
    - derive/ik/iak/    #еёӮеҚҖгҖҒжө·еҸЈ
    #- derive/erng/ng/    #еёӮеҚҖгҖҒжө·еҸЈ
    - derive/cerk/cak/  # еәңеҹҺзӯүгҖҢиіҠгҖҚгҖҢеүҮгҖҚж–Үи®Җ
    #- derive/7/3/    #йҷ°йҷҪеҺ»жң¬иӘҝ
    - derive/er([^eptkmng]*)(h?)$/e$1$2/    #жө·еҸЈи…”
    - derive/6/1/    #жө·еҸЈи…”
    #- derive/iO/er/    #ж°ёжҳҘ
    #- derive/aInn/ing/  #еұұе…§и…”пјҲж°ёжҳҘгҖҒе®үжәӘвҖҰпјү
    #- derive/naI/ling/  #еұұе…§и…”
    #- derive/ngaI/ging/  #еұұе…§и…”
    #- derive/ia?m/em/  #жғ е®ү
    #- derive/ia?n/en/  #жғ е®ү
    - derive/erm/im/  #гҖҢй‘«гҖҚгҖҒгҖҢж¬ЈгҖҚи®ҖеҒҡimйҹ»
    - derive/(m|n|ng)o(h?\d?)$/$1oo$2/
    - derive/^([a-z]+)\d$/$1/
    - 'xlit 12345678 [/\]90-;'

