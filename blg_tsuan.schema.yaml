reverse_lookup:
  dictionary: luna_pinyin
  prefix: "`"
  tips: гҖ”жӢјйҹігҖ•
  preedit_format:
    - xform/([nljqxy])v/$1Гј/

punctuator:
  import_preset: symbols

key_binder:
  import_preset: default
  bindings:
    - { when: has_menu, accept: minus, send: minus }  # з¬¬7иӘҝ
    - { when: paging, accept: minus, send: Page_Up }

recognizer:
  import_preset: default
  patterns:
    punct: "^/([0-9]0?|[a-z]+)$"
    uppercase: "^[A-Z][-_+.'0-9A-Za-z]*$"
    url: "^(www[.]|https?:|ftp:|mailto:).*$"
    reverse_lookup: "`[a-z]*'?$|[a-z]*'$"

customization:
  region_tags:
    - жіү

hant:
  option_name: hant
  opencc_config: tw2t.json
  tips: all

hans:
  option_name: hans
  opencc_config: tw2s.json
  tips: all

variants:
  option_name: variants
  opencc_config: biauim_variants.json
  tips: all
