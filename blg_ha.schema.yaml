# Rime schema
# vim: set sw=2 sts=2 et:
# encoding: utf-8

schema:
  schema_id: blg_ha
  name: 閩南語廈門音
  version: "2026.4.29"
  author:
    - 阿托 <a-thok@outlook.com>
    - Enatsu <unsioer@outlook.com>
  description: |
    閩南語輸入方案
    採用「臺灣閩南語羅馬字拼音方案」
    http://www.ntcu.edu.tw/tailo/

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - options: [ tw, hant, hans ]
    states: [ 臺繁, 通繁, 简体 ] # 通繁倚靠 OpenCC 繁體
  - name: variants
    reset: 1
    states: [ 原始, 兼容 ] # 繁簡轉換，單字兼容「着/著」

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - echo_translator
    - punct_translator
    - r10n_translator
    - reverse_lookup_translator
  filters:
    - simplifier@hant
    - simplifier@hans
    - simplifier@variants
    - uniquifier
    - lua_filter@*biauim.schema_dict_isolation

speller:
  alphabet: 'zyxwvutsrqponmlkjihgfedcba~[/\]90-;'
  initials: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    - xform/\{[^\}]*\}//
    - xform/(\d)0/$1/ # 輕聲標記
    - abbrev/^([ptkbgmlschj]h?).+$/$1/ 
    - derive/^c/ts/
    - derive/S/i/  # 「雙」「摔」「針」「汁」
    - derive/JINN/ni/ # 「耳」「爾」文讀
    - derive/NG/ng/ # 「毛」「兩」白讀
    # - derive/uih/uih/
    - derive/^j/l/
    - derive/6/7/
    - derive/Ia/io/
    - derive/Uee/ui/  # 「畫」「劃」
    - derive/ee/e/
    - derive/enn/inn/
    - derive/^([mn]g?)ee/$1i
    - derive/ira/ia/
    - derive/IR(h?\d?)/i$1/    #魚韻讀i特字
    - derive/ir(h?\d?)/u$1/
    - derive/ur/u/
    - derive/er([^eptkmng]*)(h?)$/e$1$2/
    - derive/Er/er/
    - derive/Er/e/
    - derive/ere/ue/
    - derive/uIn?n?/ng/
    - derive/iO/oo/
    - derive/U([^e|$])/u$1/
    - derive/uAinn/uainn/
    - derive/aInn/ing/
    - derive/^ngaI/ging/
    - derive/aI/ai/
    - derive/^mue/mui/
    - derive/er([nt])(\d?\s?)/u$1$2/
    - derive/erm/im/
    - derive/(m|n|ng)o(h?\d?)$/$1oo$2/
    - derive/^([a-z]+)\d$/$1/
    - 'xlit 12345678 [/\]90-;'

translator:
  dictionary: banlam
  prism: bamlam_ha # 分離 prism，避免多方案共享同一 banlam.prism.bin 時的衝突
  spelling_hints: 5
  comment_format:
    # - xform/\{.*\}//
    - 'xform ([aeiou])(r?m?n*h?g?p?t?k?)([\[/\\\]90\-;]) $1$3$2'
    - 'xform ([aeo])([iueo])([\[/\\\]90\-;]) $1$3$2'
    - 'xform a\[ a'
    - 'xform e\[ e'
    - 'xform i\[ i'
    - 'xform u\[ u'
    - 'xform o\[ o'
    - 'xform m\[ m'
    - 'xform ng\[ ng'
    - 'xform a/ á'
    - 'xform e/ é'
    - 'xform i/ í'
    - 'xform u/ ú'
    - 'xform o/ ó'
    - 'xform m/ ḿ'
    - 'xform ng/ ńg'
    - 'xform a\\ à'
    - 'xform e\\ è'
    - 'xform i\\ ì'
    - 'xform u\\ ù'
    - 'xform o\\ ò'
    - 'xform ng\\ ǹg'
    - 'xform a\] a'
    - 'xform e\] e'
    - 'xform i\] i'
    - 'xform u\] u'
    - 'xform o\] o'
    - 'xform mh\] mh'
    - 'xform ngh\] ngh'
    - 'xform a9 â'
    - 'xform e9 ê'
    - 'xform i9 î'
    - 'xform u9 û'
    - 'xform o9 ô'
    - 'xform m9 m̂'
    - 'xform ng9 n̂g'
    - 'xform a0 ǎ'
    - 'xform e0 ě'
    - 'xform i0 ǐ'
    - 'xform u0 ǔ'
    - 'xform o0 ǒ'
    - 'xform ng0 ňg'
    - 'xform a- ā'
    - 'xform e- ē'
    - 'xform i- ī'
    - 'xform u- ū'
    - 'xform o- ō'
    - 'xform m- m̄'
    - 'xform ng- n̄g'
    - 'xform a; a̍'
    - 'xform e; e̍'
    - 'xform i; i̍'
    - 'xform u; u̍'
    - 'xform o; o̍'
    - 'xform mh; m̍h'
    - 'xform ngh; n̍gh'
    - 'xform w u'
    - 'xform y i'
    - 'xform c ts'
    - 'xform q h'

reverse_lookup:
  dictionary: luna_pinyin
  prefix: "`"
  tips: 〔拼音〕
  preedit_format:
    - xform/([nljqxy])v/$1ü/

punctuator:
  import_preset: symbols

key_binder:
  import_preset: default
  bindings:
    - { when: has_menu, accept: minus, send: minus }  # 第7調
    - { when: paging, accept: minus, send: Page_Up }

recognizer:
  import_preset: default
  patterns:
    punct: "^/([0-9]0?|[a-z]+)$"
    uppercase: "^[A-Z][-_+.'0-9A-Za-z]*$"
    url: "^(www[.]|https?:|ftp:|mailto:).*$"
    reverse_lookup: "`[a-z]*'?$|[a-z]*'$"

customization:
  region_tags:
    - 廈

hant:
  option_name: hant
  opencc_config: tw2t.json
  tips: all

hans:
  option_name: hans
  # opencc_config: biauim_tw2s.json # 愛對 Rime 系統資料夾複製 biauim_tw2s.json 要求的相應 ocd2
  opencc_config: tw2s.json
  tips: all

variants:
  option_name: variants
  opencc_config: biauim_variants.json
  tips: all
