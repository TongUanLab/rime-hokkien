# Rime schema
# vim: set sw=2 sts=2 et:
# encoding: utf-8

schema:
  schema_id: blg_tsiang
  name: 閩南語漳州音
  version: "2026.4.29"
  author:
    - 阿托 <a-thok@outlook.com>
    - Enatsu <unsioer@outlook.com>
  description: |
    閩南語輸入方案
    採用「臺灣閩南語羅馬字拼音方案」
    http://www.ntcu.edu.tw/tailo/

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - options: [ tw, hant, hans ]
    states: [ 臺繁, 通繁, 简体 ] # 通繁倚靠 OpenCC 繁體
  - name: variants
    reset: 1
    states: [ 原始, 兼容 ] # 繁簡轉換，單字兼容「着/著」

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - echo_translator
    - punct_translator
    - r10n_translator
    - reverse_lookup_translator
  filters:
    - simplifier@hant
    - simplifier@hans
    - simplifier@variants
    - uniquifier
    - lua_filter@*biauim.schema_dict_isolation

speller:
  alphabet: 'zyxwvutsrqponmlkjihgfedcba~[/\]90-;'
  initials: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    - xform/\{[^\}]*\}//
    - abbrev/^([ptkbgmlschj]h?).+$/$1/ 
    - derive/^c/ts/
    - derive/S/i/  # 「雙」「摔」「針」「汁」
    - derive/sSan/san/ #「鉎」（鏽）漳南異讀
    - derive/JINN/ji/ # 「耳」「爾」文讀
    - derive/JINN/jinn/ # 「耳」「爾」文讀
    - derive/uih/ueh/
    - derive/6/7/
    - derive/Ia/ia/
    - derive/^enn/inn/  # 雲霄
    - derive/^([mn]g?)ee/$1i/  # 雲霄
    - derive/IR/ir/
    - derive/ir/i/
    - derive/ur/u/
    - derive/er([^eptkmng]*)(h?)$/ue$1$2/
    - derive/ere/e/
    - derive/^([^eur]*)e(\d?)$/$1ei$2/    #漳南
    #- derive/^([^eur]*)e(\d?)$/$1iei$2/    #漳浦
    - derive/Er/e/
    - derive/uAinn/uan/
    - derive/muai/mai/  #「糜妹」市區又讀mai
    - derive/^([hk])uenn/$1uann/  # 漳北
    - derive/^([hk])uainn/$1uann/  # 漳北
    - derive/^([hk])uainn/$1uenn/
    - derive/^([hk])uainn/$1uinn/  # 雲霄
    - derive/iO/oo/
    - derive/U/i/
    - derive/aInn/an/
    - derive/aInn/ing/
    - derive/^ngaI/gan/
    - derive/^ngaI/ging/
    - derive/^mue/bue/
    - derive/iunn/ionn/  
    - derive/niu/nio/
    - derive/uee/ua/
    - derive/ern/in/
    - derive/ere/e/
    - derive/uI/ui/
    - derive/i(ng|k)/e$1/    #漳南
    #- derive/i(ng|k)/io$1/    #漳南
    - derive/oo/ou/    #漳南
    - derive/([a-z]+)\d/$1/
    - 'xlit 12345678 [/\]90-;'

translator:
  dictionary: banlam
  prism: bamlam_tsiang # 分離 prism，避免多方案共享同一 banlam.prism.bin 時的衝突
  spelling_hints: 5
  comment_format:
    - xform/\{.*\}//
    - 'xform ([aeiou])(r?m?n*h?g?p?t?k?)([\[/\\\]90\-;]) $1$3$2'
    - 'xform ([aeo])([iueo])([\[/\\\]90\-;]) $1$3$2'
    - 'xform a\[ a'
    - 'xform e\[ e'
    - 'xform i\[ i'
    - 'xform u\[ u'
    - 'xform o\[ o'
    - 'xform m\[ m'
    - 'xform ng\[ ng'
    - 'xform a/ á'
    - 'xform e/ é'
    - 'xform i/ í'
    - 'xform u/ ú'
    - 'xform o/ ó'
    - 'xform m/ ḿ'
    - 'xform ng/ ńg'
    - 'xform a\\ à'
    - 'xform e\\ è'
    - 'xform i\\ ì'
    - 'xform u\\ ù'
    - 'xform o\\ ò'
    - 'xform ng\\ ǹg'
    - 'xform a\] a'
    - 'xform e\] e'
    - 'xform i\] i'
    - 'xform u\] u'
    - 'xform o\] o'
    - 'xform mh\] mh'
    - 'xform ngh\] ngh'
    - 'xform a9 â'
    - 'xform e9 ê'
    - 'xform i9 î'
    - 'xform u9 û'
    - 'xform o9 ô'
    - 'xform m9 m̂'
    - 'xform ng9 n̂g'
    - 'xform a0 ǎ'
    - 'xform e0 ě'
    - 'xform i0 ǐ'
    - 'xform u0 ǔ'
    - 'xform o0 ǒ'
    - 'xform ng0 ňg'
    - 'xform a- ā'
    - 'xform e- ē'
    - 'xform i- ī'
    - 'xform u- ū'
    - 'xform o- ō'
    - 'xform m- m̄'
    - 'xform ng- n̄g'
    - 'xform a; a̍'
    - 'xform e; e̍'
    - 'xform i; i̍'
    - 'xform u; u̍'
    - 'xform o; o̍'
    - 'xform mh; m̍h'
    - 'xform ngh; n̍gh'
    - 'xform w u'
    - 'xform y i'
    - 'xform c ts'
    - 'xform q h'

reverse_lookup:
  dictionary: luna_pinyin
  prefix: "`"
  tips: 〔拼音〕
  preedit_format:
    - xform/([nljqxy])v/$1ü/

punctuator:
  import_preset: symbols

key_binder:
  import_preset: default
  bindings:
    - { when: has_menu, accept: minus, send: minus }  # 第7調
    - { when: paging, accept: minus, send: Page_Up }

recognizer:
  import_preset: default
  patterns:
    punct: "^/([0-9]0?|[a-z]+)$"
    uppercase: "^[A-Z][-_+.'0-9A-Za-z]*$"
    url: "^(www[.]|https?:|ftp:|mailto:).*$"
    reverse_lookup: "`[a-z]*'?$|[a-z]*'$"

customization:
  region_tags:
    - 漳
    - 漳南
    - 雲霄

hant:
  option_name: hant
  opencc_config: tw2t.json
  tips: all

hans:
  option_name: hans
  opencc_config: tw2s.json
  tips: all

variants:
  option_name: variants
  opencc_config: biauim_variants.json
  tips: all
